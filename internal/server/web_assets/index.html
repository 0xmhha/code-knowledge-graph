<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CKG Viewer</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, system-ui, sans-serif; background: #0d0e10; color: #e6e7e9; }
    #app { display: grid; grid-template-rows: 40px 1fr 32px; grid-template-columns: 1fr 400px; height: 100%; }
    #topbar { grid-column: 1 / span 2; padding: 8px; background: #1a1c1f; display: flex; gap: 8px; align-items: center; }
    #canvas { position: relative; }
    #panel { background: #1a1c1f; border-left: 1px solid #2a2c30; display: flex; flex-direction: column; min-height: 0; }
    #node-list { flex: 1 1 50%; overflow-y: auto; border-bottom: 1px solid #2a2c30; padding: 6px; min-height: 0; }
    #node-list .item { padding: 5px 6px; border-bottom: 1px solid #22242a; cursor: pointer; font-family: ui-monospace, monospace; font-size: 11px; }
    #node-list .item:hover { background: #232529; }
    #node-list .item .head { color: #cfd0d3; }
    #node-list .item .head .type { color: #7ab8ff; }
    #node-list .item .qname { color: #888; font-size: 10.5px; word-break: break-all; }
    #node-list .item .file { color: #5a6068; font-size: 10px; }
    #node-list .listmeta { font-size: 11px; color: #888; padding: 4px 6px; border-bottom: 1px solid #2a2c30; }
    #node-detail { flex: 1 1 50%; overflow-y: auto; padding: 12px; font-size: 13px; min-height: 0; }
    #bottombar { grid-column: 1 / span 2; background: #1a1c1f; padding: 4px 8px; font-size: 12px; }
    .stale-banner { background: #5a4a00; color: #fff; padding: 6px; }
  </style>
</head>
<body>
  <div id="app">
    <div id="topbar">
      <strong>ckg viewer</strong>
      <input id="search" placeholder="search…" style="flex:1; padding:4px 8px; background:#0d0e10; color:#e6e7e9; border:1px solid #2a2c30;" />
      <span id="src-info"></span>
    </div>
    <div id="canvas"></div>
    <div id="panel">
      <div id="node-list"></div>
      <div id="node-detail">Select a node to inspect.</div>
    </div>
    <div id="bottombar">
      <button id="hierarchy-toggle">topic ↔ pkg</button>
      <span style="margin-left:12px;">LOD: <span id="lod">L0</span></span>
    </div>
  </div>
  <script type="module" src="/assets/viewer.js"></script>
</body>
</html>
