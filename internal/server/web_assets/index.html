<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CKG Viewer</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: -apple-system, system-ui, sans-serif; background: #0d0e10; color: #e6e7e9; }
    /* Grid: when sidebar is hidden, the right column collapses to 0px so canvas fills the window. */
    #app { display: grid; grid-template-rows: 32px 1fr 28px; grid-template-columns: 1fr 280px; height: 100vh; width: 100vw; transition: grid-template-columns 120ms ease; }
    #app.no-panel { grid-template-columns: 1fr 0px; }
    #app.no-panel #panel { display: none; }
    #topbar { grid-column: 1 / span 2; padding: 4px 8px; background: #1a1c1f; display: flex; gap: 6px; align-items: center; font-size: 12px; }
    #topbar strong { font-size: 12px; }
    #topbar button { background: #232529; color: #e6e7e9; border: 1px solid #2a2c30; padding: 2px 8px; cursor: pointer; font-size: 11px; }
    #topbar button:hover { background: #2a2c30; }
    #canvas { position: relative; min-width: 0; }
    #panel { background: #1a1c1f; border-left: 1px solid #2a2c30; display: flex; flex-direction: column; min-height: 0; min-width: 0; }
    #node-list { flex: 1 1 45%; overflow-y: auto; border-bottom: 1px solid #2a2c30; padding: 4px; min-height: 0; }
    #node-list .item { padding: 4px 5px; border-bottom: 1px solid #22242a; cursor: pointer; font-family: ui-monospace, monospace; font-size: 10.5px; }
    #node-list .item:hover { background: #232529; }
    #node-list .item .head { color: #cfd0d3; }
    #node-list .item .head .type { color: #7ab8ff; }
    #node-list .item .qname { color: #888; font-size: 10px; word-break: break-all; }
    #node-list .item .file { color: #5a6068; font-size: 9.5px; }
    #node-list .listmeta { font-size: 10.5px; color: #888; padding: 3px 5px; border-bottom: 1px solid #2a2c30; position: sticky; top: 0; background: #1a1c1f; }
    #node-detail { flex: 1 1 55%; overflow-y: auto; padding: 8px 10px; font-size: 12px; min-height: 0; }
    #node-detail h3 { font-size: 13px; margin: 0 0 6px 0; }
    #node-detail h4 { font-size: 11px; margin: 8px 0 3px 0; }
    #node-detail pre { font-size: 10.5px; max-height: 200px !important; }
    #bottombar { grid-column: 1 / span 2; background: #1a1c1f; padding: 3px 8px; font-size: 11px; display: flex; gap: 12px; align-items: center; }
    #bottombar button { background: #232529; color: #e6e7e9; border: 1px solid #2a2c30; padding: 2px 8px; cursor: pointer; font-size: 11px; min-width: 28px; }
    #bottombar button:hover { background: #2a2c30; }
    .stale-banner { background: #5a4a00; color: #fff; padding: 4px 8px; font-size: 11px; }
  </style>
</head>
<body>
  <div id="app">
    <div id="topbar">
      <strong>ckg</strong>
      <input id="search" placeholder="search…" style="flex:1; padding:3px 6px; background:#0d0e10; color:#e6e7e9; border:1px solid #2a2c30; font-size:11px; min-width:0;" />
      <button id="panel-toggle" title="Hide / show right panel">⇆</button>
      <span id="src-info" style="font-size:11px; color:#888; max-width:280px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"></span>
    </div>
    <div id="canvas"></div>
    <div id="panel">
      <div id="node-list"></div>
      <div id="node-detail">Select a node to inspect.</div>
    </div>
    <div id="bottombar">
      <button id="hierarchy-toggle">topic ↔ pkg</button>
      <span>LOD: <span id="lod">L0</span></span>
      <span style="margin-left:auto;display:inline-flex;gap:4px;">
        <button id="zoom-in" title="Zoom in (=)">＋</button>
        <button id="zoom-out" title="Zoom out (-)">−</button>
        <button id="zoom-reset" title="Reset camera (0)">⟲</button>
      </span>
    </div>
  </div>
  <script type="module" src="/assets/viewer.js"></script>
</body>
</html>
